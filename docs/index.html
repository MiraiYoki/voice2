<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>空间语音聊天室 2.0</title>
<style>
:root { --bg:#16132b;--card:#211d3d;--text:#e8e4f2;--text2:#726d87;--accent:#9b4dff;
  --accent-dim:rgba(155,77,255,0.12);--danger:#e04949;--danger-dim:rgba(224,73,73,0.12);
  --border:#3a3452;--radius:14px;--radius-sm:10px; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:var(--bg);color:var(--text);height:100vh;display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;overflow:hidden;}
.app{width:100%;max-width:520px;height:100%;display:flex;flex-direction:column;padding:6px 12px;gap:6px;}
.header{text-align:center;padding:4px 0 0;flex-shrink:0;}
.header h1{font-size:16px;font-weight:640;letter-spacing:-0.025em;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;}
.map-wrap{flex:1 1 0;min-height:0;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;position:relative;display:none;}
.map-wrap canvas{display:block;width:100%;height:100%;cursor:grab;}
.map-wrap canvas:active{cursor:grabbing;}
.game-bar{flex-shrink:0;align-items:center;gap:8px;padding:2px 0;display:none;}
.joystick{width:100px;height:100px;border-radius:50%;flex-shrink:0;background:rgba(25,20,45,0.95);border:3px solid rgba(155,77,255,0.65);touch-action:none;-webkit-user-select:none;user-select:none;display:flex;align-items:center;justify-content:center;position:relative;}
.joystick::before,.joystick::after{content:'';position:absolute;background:rgba(155,77,255,0.3);}
.joystick::before{width:3px;height:50px;border-radius:2px;}
.joystick::after{width:50px;height:3px;border-radius:2px;}
.joystick .stick{width:38px;height:38px;border-radius:50%;background:rgba(155,77,255,0.8);position:relative;z-index:1;box-shadow:0 0 16px rgba(155,77,255,0.3);}
.joystick.active{border-color:var(--accent);box-shadow:0 0 20px rgba(155,77,255,0.2);}
.joystick.active .stick{background:var(--accent);}
.panel{flex:1;overflow-y:auto;padding:4px;}
.panel::-webkit-scrollbar{width:0;}
.home-panel{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 8px;}
.home-cards{display:flex;flex-direction:column;gap:16px;}
.home-card{display:flex;align-items:center;gap:16px;padding:24px 20px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;cursor:pointer;transition:transform .15s,border-color .2s,box-shadow .2s;}
.home-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(155,77,255,0.12);}
.home-card-ring{width:60px;height:60px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);}
.home-card-body{flex:1;}
.home-card-title{font-size:18px;font-weight:650;margin-bottom:4px;}
.home-card-desc{font-size:13px;color:var(--text2);}
.room-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:transform .15s;}
.room-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.room-card .room-icon{font-size:22px;flex-shrink:0;}
.room-card .room-info{flex:1;min-width:0;}
.room-card .room-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-card .room-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.room-card .room-count{font-size:12px;color:var(--accent);font-weight:640;background:var(--accent-dim);padding:4px 10px;border-radius:12px;white-space:nowrap;}
.room-empty{text-align:center;color:var(--text2);padding:40px 24px;font-size:13px;}
input{font-family:inherit;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);outline:none;}
input:focus{border-color:var(--accent);}
.btn{padding:8px 18px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;transition:transform .12s;}
.btn:active{transform:scale(.96);}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;}
.back-btn:hover{border-color:var(--accent);}
.room-badge{display:inline-flex;align-items:center;gap:5px;background:var(--accent-dim);color:var(--accent);padding:3px 11px;border-radius:20px;font-size:11px;font-weight:540;}
.room-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
/* 调试面板 */
.debug-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,8,22,0.94);z-index:200;flex-direction:column;padding:12px;}
.debug-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:8px;}
.debug-header h2{font-size:14px;font-weight:640;}
.debug-filters{display:flex;gap:6px;flex-shrink:0;margin-bottom:8px;flex-wrap:wrap;}
.debug-filters button{padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;cursor:pointer;}
.debug-wrap{flex:1;overflow-y:auto;background:rgba(0,0,0,0.3);border-radius:var(--radius-sm);padding:8px;}
.debug-wrap::-webkit-scrollbar{width:4px;}
.debug-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.debug-empty{text-align:center;color:var(--text2);font-size:12px;padding:24px;}
</style>
  <script type="module" crossorigin src="./assets/index-BDb79uXY.js"></script>
</head>
<body>
<div class="app">
  <div class="header"><h1 id="room-title">空间语音聊天室 <span style="font-size:10px;color:var(--text2);font-weight:400">v3.1.6</span></h1><div style="font-size:10px;color:var(--accent)"><span id="conn-dot" style="display:none;width:7px;height:7px;border-radius:50%;background:#e04949;vertical-align:middle;margin-right:4px" title="连接状态"></span><span id="status">输入房间名加入</span></div></div>
  <div class="home-panel" id="home-panel"><div class="home-cards">
    <div class="home-card" id="btn-create-room-card"><div class="home-card-ring"><i>＋</i></div><div class="home-card-body"><div class="home-card-title">创建房间</div><div class="home-card-desc">设置名称与密码</div></div></div>
    <div class="home-card" id="btn-find-rooms"><div class="home-card-ring"><i>🔍</i></div><div class="home-card-body"><div class="home-card-title">查找房间</div><div class="home-card-desc">浏览或搜索已有房间</div></div></div>
    <div class="home-card" id="btn-profile"><div class="home-card-ring" id="home-avatar-ring"><i>👤</i></div><div class="home-card-body"><div class="home-card-title">角色设置</div><div class="home-card-desc" id="home-profile-name">未设置角色</div></div></div>
    <div class="home-card" id="btn-stereo-pre" style="background:#1a3328;border-color:#22c55e33"><div class="home-card-ring" style="background:rgba(34,197,94,0.12);color:#22c55e"><i>🎧</i></div><div class="home-card-body"><div class="home-card-title" style="color:#22c55e">立体声测试</div><div class="home-card-desc" id="stereo-pre-status">进房间前测试左右声道</div></div></div>
  </div></div>
  <div class="panel" id="create-panel" style="display:none"><button class="back-btn" id="create-back">← 返回</button><div style="margin-top:16px;display:flex;flex-direction:column;gap:12px"><input id="create-name" placeholder="房间名称"><input id="create-pw" placeholder="密码(可选)" type="password"><button class="btn" id="btn-create-room">创建并进入</button></div></div>
  <div class="panel" id="room-panel" style="display:none"><div style="display:flex;gap:8px;margin-bottom:8px"><button class="back-btn" id="room-back">← 返回</button><input id="room-search" placeholder="搜索房间..."></div><div class="room-empty" id="room-empty">加载中...</div><div id="room-list"></div></div>
  <div class="panel" id="profile-panel" style="display:none"><button class="back-btn" id="profile-back">← 返回</button><div style="text-align:center;padding:16px 0;margin-top:8px"><label for="avatar-upload" style="cursor:pointer"><div id="avatar-preview" style="width:80px;height:80px;border-radius:50%;background:var(--card);border:2px dashed var(--border);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;overflow:hidden">📷</div></label><input type="file" id="avatar-upload" accept="image/*" style="display:none" title="上传头像"><input id="profile-name" placeholder="输入角色名称" maxlength="12"></div></div>
  <div class="map-wrap" id="map-wrap"><canvas id="map-canvas"></canvas></div>
  <div class="game-bar" id="game-bar"><div class="joystick" id="joystick"><div class="stick" id="joystick-stick"></div></div><div style="flex:1;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px"><label for="game-avatar-upload" style="cursor:pointer;flex-shrink:0"><div id="self-color" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#5b4dcc,#7c6aee);display:flex;align-items:center;justify-content:center;background-size:cover"></div></label><input type="file" id="game-avatar-upload" accept="image/*" style="display:none" title="上传头像"><div style="flex:1;min-width:0;cursor:pointer" id="self-name-wrap"><div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="self-name">我</div><div style="font-size:11px" id="self-mic">发言中</div></div><button class="btn" id="btn-mic" style="width:48px;height:48px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:20px">🎤</button><button class="btn btn-secondary" id="btn-debug" style="width:36px;height:36px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px">📋</button><button class="btn btn-secondary" id="btn-leave" style="width:36px;height:36px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center">🚪</button></div></div>
</div>
<!-- 调试面板 -->
<div class="debug-panel" id="debug-panel">
  <div class="debug-header"><h2>📋 调试日志</h2><button class="btn btn-secondary" id="debug-close" style="padding:4px 10px;font-size:12px">✕</button></div>
  <div class="debug-filters">
    <button id="debug-filter-all" style="background:var(--accent)">全部</button>
    <button id="debug-filter-conn">🔗 连接</button>
    <button id="debug-filter-audio">🎧 音频</button>
    <button id="debug-filter-pos">📍 位置</button>
    <button id="debug-filter-avatar">🖼️ 头像</button>
  </div>
  <div style="flex-shrink:0;margin:8px 0;padding:8px;background:var(--card);border-radius:var(--radius-sm)">
    <div style="font-size:12px;font-weight:600;margin-bottom:6px">🎧 立体声测试</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button id="stereo-test-a" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Panner</button>
      <button id="stereo-test-b" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Merger</button>
      <button id="stereo-test-c" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Haas</button>
      <button id="stereo-test-d" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Buf</button>
      <button id="stereo-test-e" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">Dest</button>
      <button id="stereo-test-f" class="btn btn-secondary" style="font-size:11px;padding:4px 10px">WAV</button>
      <button id="stereo-test-stop" class="btn" style="font-size:11px;padding:4px 10px;background:var(--danger)">■</button>
    </div>
    <div id="stereo-test-status" style="font-size:10px;color:var(--text2);margin-top:4px">点击按钮播放左→右移动测试音</div>
  </div>
  <div class="debug-wrap" id="debug-wrap"><div class="debug-list" id="debug-list"></div></div>
</div>
</body>
</html>
