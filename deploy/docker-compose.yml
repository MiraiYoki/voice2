# voice2 V4.0.0 — 自建服务器部署
# 运行: docker compose up -d
# 查看: docker compose logs -f
# 停止: docker compose down

services:
  # ── LiveKit 语音 SFU ──
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"   # WebRTC 信令
      - "7881:7881"   # TCP fallback
      - "7882:7882"   # UDP 音频
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml --node-ip 49.233.177.94
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  # ── Redis (LiveKit 状态存储) ──
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── MQTT 房间发现 ──
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "9001:9001"  # WebSocket
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  # ── nginx 静态文件 + 反向代理 ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../docs:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  redis_data:
