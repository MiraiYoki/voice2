# nginx 配置 v4.0.0
# voice2 静态文件 + LiveKit WebSocket 代理

server {
    listen 80;
    server_name _;

    # 静态文件
    root /usr/share/nginx/html;
    index index.html;

    # 地图/音乐/音效缓存 (7天)
    location ~* \.(jpg|png|mp3|m4a)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JS/CSS 缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
